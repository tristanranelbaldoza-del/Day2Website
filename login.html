<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Log In — Tester.io</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:     #15100a;
    --bg-2:   #1d1609;
    --panel:  #221a0e;
    --panel-2:#2a2212;
    --border: rgba(198, 165, 89, 0.18);
    --gold:   #c6a559;
    --gold-2: #e6b979;
    --cream:  #f5ead6;
    --dim:    #8a7a58;
    --err:    #e58a72;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Montserrat', -apple-system, sans-serif;
    background:
      radial-gradient(1000px 500px at 80% -10%, rgba(198,165,89,0.12), transparent 60%),
      radial-gradient(800px 400px at 20% 110%, rgba(230,185,121,0.08), transparent 60%),
      var(--bg);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }

  header {
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .logo {
    font-size: 13px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--cream);
  }
  .logo span { color: var(--gold-2); }
  .back {
    margin-left: auto;
    font-size: 13px; font-weight: 500;
    color: rgba(245,234,214,0.55);
    transition: color 160ms;
  }
  .back:hover { color: var(--gold-2); }

  .wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px 80px;
  }
  .card {
    width: min(440px, 100%);
    padding: 44px 40px;
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 40px 80px -20px rgba(0,0,0,0.6);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #f0c990, var(--gold) 50%, var(--gold-2));
  }
  h1 {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .sub { font-size: 14px; color: rgba(245,234,214,0.6); margin-bottom: 28px; line-height: 1.55; }

  .notice {
    background: rgba(230,185,121,0.08);
    border: 1px solid rgba(230,185,121,0.22);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12.5px;
    line-height: 1.5;
    color: rgba(245,234,214,0.85);
    margin-bottom: 24px;
  }
  .notice strong { color: var(--gold-2); font-weight: 700; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.12em;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--dim);
    margin: 18px 0 8px;
  }
  input {
    width: 100%;
    font-family: inherit;
    color: var(--cream);
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px;
    font-size: 14.5px;
    outline: none;
    transition: border-color 180ms ease, box-shadow 180ms ease;
  }
  input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(198,165,89,0.15); }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
  }
  .remember { font-size: 13px; color: rgba(245,234,214,0.65); display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .remember input { width: auto; }
  .forgot { font-size: 13px; font-weight: 500; color: var(--gold-2); }
  .forgot:hover { text-decoration: underline; }

  .btn-primary {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14.5px;
    background: linear-gradient(135deg, var(--gold), var(--gold-2));
    color: #1a1207;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: transform 160ms, box-shadow 160ms;
    box-shadow: 0 6px 20px rgba(198,165,89,0.25), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(198,165,89,0.35), inset 0 1px 0 rgba(255,255,255,0.35); }
  .btn-primary:active { transform: translateY(0); }

  .divider {
    margin: 28px 0 22px;
    position: relative;
    text-align: center;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--dim);
  }
  .divider::before, .divider::after {
    content: ''; position: absolute; top: 50%;
    height: 1px; width: 35%;
    background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after  { right: 0; }

  .sso-row { display: flex; gap: 10px; }
  .btn-sso {
    flex: 1;
    padding: 11px;
    font-family: inherit; font-weight: 600; font-size: 13px;
    color: var(--cream);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 160ms, background 160ms, color 160ms;
  }
  .btn-sso:hover { border-color: var(--gold); color: var(--gold-2); background: rgba(198,165,89,0.04); }

  .footer-link { margin-top: 26px; text-align: center; font-size: 13.5px; color: rgba(245,234,214,0.55); }
  .footer-link a { color: var(--gold-2); font-weight: 600; }
  .footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

  <header>
    <a href="/" class="logo">Tester<span>.io</span></a>
    <a href="/" class="back">← Back to site</a>
  </header>

  <div class="wrap">
    <div class="card">
      <h1>Welcome back.</h1>
      <p class="sub">Sign in to access your test suites, dashboards, and run history.</p>

      <div class="notice">
        <strong>Heads up:</strong> user accounts are still in private beta. Submit a note via the
        <a href="/#contact" style="color: var(--gold-2); font-weight: 600;">contact form</a>
        for early access.
      </div>

      <form action="/coming-soon.html" method="post" onsubmit="event.preventDefault(); window.location='/coming-soon.html';">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@company.com" autocomplete="email" required />

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />

        <div class="row">
          <label class="remember"><input type="checkbox" /> Remember me</label>
          <a href="/coming-soon.html" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary">Sign In</button>
      </form>

      <div class="divider">or</div>
      <div class="sso-row">
        <button type="button" class="btn-sso" onclick="window.location='/coming-soon.html'">Continue with Google</button>
        <button type="button" class="btn-sso" onclick="window.location='/coming-soon.html'">Continue with GitHub</button>
      </div>

      <p class="footer-link">
        Don't have an account? <a href="/signup.html">Sign up free</a>
      </p>
    </div>
  </div>

</body>
</html>
