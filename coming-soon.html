<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Coming Soon — Tester.io</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:     #15100a;
    --bg-2:   #1d1609;
    --panel:  #221a0e;
    --gold:   #c6a559;
    --gold-2: #e6b979;
    --cream:  #f5ead6;
    --dim:    #8a7a58;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Montserrat', -apple-system, sans-serif;
    background:
      radial-gradient(1000px 500px at 80% -10%, rgba(198,165,89,0.12), transparent 60%),
      radial-gradient(800px 400px at 20% 110%, rgba(230,185,121,0.08), transparent 60%),
      var(--bg);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }
  .wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    text-align: center;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    border: 1px solid rgba(198,165,89,0.3);
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 0.2em;
    font-weight: 700;
    text-transform: uppercase;
    background: rgba(198,165,89,0.06);
    color: var(--gold-2);
    margin-bottom: 36px;
  }
  .badge .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--gold-2);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.45; transform: scale(1.25); }
  }
  h1 {
    font-size: clamp(38px, 6vw, 72px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1.02;
    max-width: 16ch;
    background: linear-gradient(135deg, #f0c990 0%, #e6b979 45%, #c6a559 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p.lead {
    margin-top: 22px;
    font-size: 17px;
    font-weight: 400;
    line-height: 1.6;
    color: rgba(245,234,214,0.72);
    max-width: 52ch;
  }
  .actions {
    margin-top: 42px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--gold-2));
    color: #1a1207;
    font-weight: 700;
    font-size: 14px;
    padding: 14px 28px;
    border-radius: 10px;
    letter-spacing: 0.01em;
    transition: transform 160ms ease, box-shadow 160ms ease;
    box-shadow: 0 6px 20px rgba(198,165,89,0.25), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(198,165,89,0.35), inset 0 1px 0 rgba(255,255,255,0.35); }
  .btn-secondary {
    color: var(--gold-2);
    font-weight: 600;
    font-size: 14px;
    padding: 14px 24px;
    border-radius: 10px;
    border: 1px solid rgba(198,165,89,0.3);
    transition: border-color 160ms, color 160ms, background 160ms;
  }
  .btn-secondary:hover { border-color: var(--gold-2); background: rgba(198,165,89,0.06); }
  .footer-mini {
    padding: 24px;
    text-align: center;
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.05em;
  }
  .logo {
    position: absolute; top: 30px; left: 32px;
    font-size: 13px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .logo span { color: var(--gold-2); }
  .glyph {
    width: 60px; height: 60px;
    margin: 0 auto 28px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(198,165,89,0.1), rgba(230,185,121,0.03));
    border: 1px solid rgba(198,165,89,0.2);
    display: flex; align-items: center; justify-content: center;
    font-family: Georgia, serif; font-size: 26px; color: var(--gold-2);
  }
</style>
</head>
<body>
  <a href="/" class="logo">Tester<span>.io</span></a>

  <div class="wrap">
    <div class="glyph">◐</div>
    <div class="badge"><span class="dot"></span> Coming Soon</div>
    <h1>Still in the workshop.</h1>
    <p class="lead">
      This page isn't live yet — we're building it with the same care as the rest of the platform.
      In the meantime, the product pages are up, and you can always reach us directly.
    </p>
    <div class="actions">
      <a href="/" class="btn-primary">← Back to home</a>
      <a href="/#contact" class="btn-secondary">Contact us instead</a>
    </div>
  </div>

  <footer class="footer-mini">
    © 2026 Tester.io — all rights reserved
  </footer>
</body>
</html>
